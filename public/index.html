<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FBA Brain">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D84315">
<link rel="manifest" href="/manifest.json">
<title>FBA Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#D84315}
body{background:#FBF8F6;color:#2D2016;font-family:'Plus Jakarta Sans',sans-serif;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}
.hdr{background:linear-gradient(135deg,#D84315,#BF360C);padding:calc(env(safe-area-inset-top,18px) + 8px) 20px 0 20px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(216,67,21,.25)}
.tabs{display:flex;gap:4px;margin-top:14px}.tab{flex:1;padding:14px 0;background:0;border:0;border-bottom:3px solid transparent;color:rgba(255,255,255,.55);font:600 13px 'Plus Jakarta Sans';cursor:pointer;transition:all .2s ease;letter-spacing:.3px;min-height:44px}.tab.on{color:#fff;border-color:#fff;opacity:1}.tab:hover,.tab:active{color:rgba(255,255,255,.85)}
.ct{padding:18px 18px calc(32px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
.card{background:#fff;border-radius:14px;border:1px solid #E8E0D8;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(45,32,22,.06),0 4px 12px rgba(45,32,22,.03);transition:box-shadow .2s ease}
.card.approved{border-color:#2E7D32;box-shadow:0 1px 4px rgba(46,125,50,.12),0 4px 12px rgba(46,125,50,.06)}.card.skip{opacity:.35}
.banner{padding:13px 18px;font:700 14px 'Plus Jakarta Sans';border-bottom:1px solid rgba(0,0,0,.04)}
.banner.green{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);color:#2E7D32}.banner.red{background:linear-gradient(135deg,#FFEBEE,#FBE9E7);color:#C62828}.banner.yellow{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);color:#E65100}
.deal-head{padding:16px 18px;cursor:pointer}
.title{font:700 17px/1.3 'Plus Jakarta Sans';color:#2D2016}.stars{font:500 13px 'Plus Jakarta Sans';color:#FF8A65;margin-top:4px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{font:700 11px 'Plus Jakarta Sans';padding:4px 10px;border-radius:8px}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.metric{background:#FBF8F6;border-radius:12px;padding:10px 8px;text-align:center;border:1px solid #E8E0D8}
.metric-label{font:600 10px 'Plus Jakarta Sans';color:#7C6F64;letter-spacing:.5px;text-transform:uppercase}.metric-value{font:700 20px 'IBM Plex Mono';margin-top:4px}
.detail{padding:0 18px 18px;border-top:1px solid #E8E0D8}
.section{background:#FBF8F6;border-radius:12px;padding:14px;margin:10px 0;border:1px solid #E8E0D8}
.section-title{font:700 12px 'Plus Jakarta Sans';color:#D84315;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.check-row{font:500 14px/1.6 'Plus Jakarta Sans';color:#7C6F64;padding:4px 0 4px 8px;border-left:3px solid #E8E0D8;margin-bottom:4px}
.check-row.pass{border-color:#2E7D32;color:#2E7D32}.check-row.fail{border-color:#C62828;color:#C62828}.check-row.warn{border-color:#E65100;color:#E65100}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E8E0D8;font:500 14px 'Plus Jakarta Sans'}
.cost-row .label{color:#7C6F64}.cost-row .value{font:600 14px 'IBM Plex Mono'}
.profit-row{display:flex;justify-content:space-between;padding:10px 0;margin-top:4px}
.profit-row .label{font:800 16px 'Plus Jakarta Sans'}.profit-row .value{font:800 24px 'IBM Plex Mono'}
.source{background:#fff;border:1px solid #E8E0D8;border-radius:10px;padding:12px 14px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s ease;min-height:48px}
.source:hover,.source:active{border-color:#FF8A65}
.source a{color:#D84315;text-decoration:none;font:600 14px 'Plus Jakarta Sans'}.source a:hover{color:#FF5722}.source .meta{font:500 12px 'Plus Jakarta Sans';color:#7C6F64}
.risk{font:500 13px/1.5 'Plus Jakarta Sans';color:#E65100;padding:6px 0 6px 10px;border-left:3px solid #FFCC80;margin:4px 0}
.btn{padding:14px 20px;border-radius:10px;font:700 15px 'Plus Jakarta Sans';cursor:pointer;border:2px solid transparent;width:100%;text-align:center;display:block;transition:all .15s ease;min-height:48px}.btn:active{transform:scale(.97);opacity:.9}
.btn-blue{background:linear-gradient(135deg,#D84315,#BF360C);color:#fff;border-color:#D84315;text-decoration:none;box-shadow:0 2px 8px rgba(216,67,21,.25)}.btn-blue:hover{box-shadow:0 4px 12px rgba(216,67,21,.35)}
.btn-green{background:#fff;color:#2E7D32;border-color:#2E7D32}.btn-green.on{background:#2E7D32;color:#fff;box-shadow:0 2px 8px rgba(46,125,50,.25)}
.btn-skip{background:#fff;color:#7C6F64;border-color:#E8E0D8}.btn-skip.on{background:#FFEBEE;color:#C62828;border-color:#C62828}
.btn-outline{background:#fff;border:1.5px solid #E8E0D8;color:#D84315;padding:12px;border-radius:10px}.btn-outline:hover{border-color:#FF8A65;background:#FFF3E0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-box{border-radius:12px;padding:12px 16px;margin:8px 0;font:600 14px/1.5 'Plus Jakarta Sans'}
.info-green{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);color:#2E7D32}.info-yellow{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);color:#E65100}.info-blue{background:linear-gradient(135deg,#FFF3E0,#FBF8F6);color:#BF360C}
.bar{height:6px;background:#E8E0D8;border-radius:3px;overflow:hidden;margin:6px 0}.bar-fill{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px 20px;color:#7C6F64;font:500 15px 'Plus Jakarta Sans'}
.inp{width:100%;padding:14px 16px;background:#FBF8F6;border:1.5px solid #E8E0D8;border-radius:12px;color:#2D2016;font:500 16px 'Plus Jakarta Sans';outline:none;transition:border-color .15s ease;min-height:48px}.inp:focus{border-color:#FF8A65;box-shadow:0 0 0 3px rgba(216,67,21,.08)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:rgba(255,255,255,.25);border-radius:3px;outline:none;margin:12px 0;padding:8px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);border:0;cursor:pointer}
.status-bar{background:#fff;border:1px solid #E8E0D8;border-radius:10px;padding:12px 16px;margin-bottom:12px;font:500 13px 'Plus Jakarta Sans';color:#7C6F64;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="hdr">
 <div style="display:flex;justify-content:space-between;align-items:center">
  <div><div style="font:800 22px 'Plus Jakarta Sans';color:#fff">FBA Brain</div><div id="status" style="font:500 12px 'Plus Jakarta Sans';color:rgba(255,255,255,.7);margin-top:2px">Loading...</div></div>
  <div style="text-align:right"><div style="font:500 11px 'Plus Jakarta Sans';color:rgba(255,255,255,.6)">BUDGET</div><div id="budgetN" style="font:800 26px 'IBM Plex Mono';color:#fff">&#163;200</div></div>
 </div>
 <input type="range" id="budgetR" min="100" max="2000" step="50" value="200">
 <div class="tabs"><button class="tab on" data-t="pipeline">Pipeline</button><button class="tab" data-t="deals">Deals</button><button class="tab" data-t="stock">P&L</button><button class="tab" data-t="setup">Setup</button></div>
</div>
<div class="ct" id="main"></div>
<script>
let S={deals:[],inventory:[],alerts:[],budget:200},D={},EX=null,TAB='pipeline',SCAN_RESULT=null;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');TAB=t.dataset.t;render();});
const sl=document.getElementById('budgetR');
sl.oninput=()=>{S.budget=+sl.value;document.getElementById('budgetN').textContent='£'+S.budget;render();fetch('/api/budget',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({budget:S.budget})});};
async function load(){try{const r=await fetch('/api/state');S=await r.json();sl.value=S.budget||200;document.getElementById('budgetN').textContent='£'+(S.budget||200);const np=(S.deals||[]).filter(d=>d.needsPrice).length;document.getElementById('status').textContent=(np?np+' deals need pricing · ':'')+(S.keepa?'Scanner active':'Add Keepa key');render();}catch(e){document.getElementById('main').innerHTML='<div class="empty">Connecting...</div>';}}
function render(){const el=document.getElementById('main');if(TAB==='pipeline')renderPipeline(el);else if(TAB==='deals')renderDeals(el);else if(TAB==='stock')renderStock(el);else renderSetup(el);}
function renderPipeline(el){const deals=S.deals||[];const inv=S.inventory||[];
// Count pipeline stages
const needPrice=deals.filter(d=>d.needsPrice);const priced=deals.filter(d=>!d.needsPrice&&d.status!=='ordered');const ordered=inv.filter(i=>i.status==='ordered');const atPrep=inv.filter(i=>i.status==='prep');const live=inv.filter(i=>i.status==='live');const totalRev=inv.reduce((a,i)=>a+(i.revenue||0),0);const totalProf=inv.reduce((a,i)=>a+(i.realProfit||0),0);

let h='<div style="font:800 20px \'Plus Jakarta Sans\';margin-bottom:4px">Automated Pipeline</div><div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64;margin-bottom:16px">App finds deals automatically. You just approve and order.</div>';

// Status bar
h+='<div class="card" style="padding:16px"><div style="display:flex;justify-content:space-between;font:500 12px \'Plus Jakarta Sans\';color:#7C6F64;margin-bottom:8px"><span>Scanner: every 2h · '+(S.keepa?'✅ Active':'❌ Add Keepa key')+'</span><span>Gmail: '+(S.gmail?'✅ Active':'Off')+'</span></div>';
h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
h+='<span class="pill" style="background:#FFF3E0;color:#E65100">'+needPrice.length+' found</span>';
h+='<span class="pill" style="background:#E8F5E9;color:#2E7D32">'+priced.length+' ready</span>';
h+='<span class="pill" style="background:#E3F2FD;color:#1565C0">'+ordered.length+' ordered</span>';
h+='<span class="pill" style="background:#F3E5F5;color:#7B1FA2">'+atPrep.length+' at prep</span>';
h+='<span class="pill" style="background:#E8F5E9;color:#2E7D32">'+live.length+' selling</span>';
h+='</div>';
if(totalRev>0)h+='<div style="margin-top:10px;font:700 14px \'IBM Plex Mono\';color:'+(totalProf>=0?'#2E7D32':'#C62828')+'">Total profit: £'+totalProf.toFixed(2)+'</div>';
h+='<div class="g2" style="margin-top:12px"><button class="btn btn-outline" style="font-size:13px;padding:10px" onclick="doScan()">Scan now</button><button class="btn btn-outline" style="font-size:13px;padding:10px" onclick="doGmail()">Check Gmail</button></div></div>';

// STEP 1: Deals needing buy price — the user's main action
if(needPrice.length){h+='<div style="font:700 16px \'Plus Jakarta Sans\';margin:18px 0 10px;color:#D84315">Step 1: Set buy price ('+needPrice.length+')</div>';
h+='<div style="font:500 12px \'Plus Jakarta Sans\';color:#7C6F64;margin-bottom:10px">Open source links → find cheapest price → enter it below</div>';
needPrice.slice(0,10).forEach((d,i)=>{const idx=deals.indexOf(d);const scC=d.score>=70?'#2E7D32':d.score>=45?'#E65100':'#C62828';
h+='<div class="card"><div style="padding:14px 18px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div class="title" style="font-size:15px">'+(d.name||'').slice(0,60)+'</div><div style="font:500 12px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:4px">'+(d.reviews||'')+(d.salesRank?' · BSR #'+d.salesRank:'')+'</div>';
if(d.estBuyPrice)h+='<div style="font:500 12px \'Plus Jakarta Sans\';color:#E65100;margin-top:4px">Est. buy: ~£'+d.estBuyPrice.toFixed(2)+' · Sell: £'+(d.sellPrice||0).toFixed(2)+'</div>';
else h+='<div style="font:500 12px \'Plus Jakarta Sans\';color:#E65100;margin-top:4px">Sell: £'+(d.sellPrice||0).toFixed(2)+'</div>';
h+='</div><div style="width:44px;height:44px;border-radius:12px;background:'+scC+'10;display:flex;align-items:center;justify-content:center;margin-left:10px"><span style="font:800 18px \'IBM Plex Mono\';color:'+scC+'">'+d.score+'</span></div></div>';
// Source links - show top 3
if(d.sources?.length){h+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">';d.sources.slice(0,4).forEach(s=>{h+='<a href="'+s.url+'" target="_blank" style="font:600 12px \'Plus Jakarta Sans\';color:#D84315;text-decoration:none;background:#FFF3E0;padding:4px 10px;border-radius:8px">'+(s.region||'')+' '+(s.name||s.n)+'</a>';});h+='</div>';}
// Price input
h+='<div style="display:flex;gap:8px;margin-top:10px;align-items:center"><input class="inp" id="bp'+idx+'" type="number" step="0.01" placeholder="£ buy price" style="flex:1;padding:10px 12px;min-height:42px;font-size:16px"><button class="btn btn-blue" style="width:auto;padding:10px 20px;min-height:42px;white-space:nowrap" onclick="setPrice('+idx+')">Set</button></div>';
h+='<a href="'+(d.amzUrl||'#')+'" target="_blank" style="font:500 11px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:6px;display:block">View on Amazon ↗</a>';
h+='</div></div>';});}

// STEP 2: Priced deals ready to order
const readyDeals=deals.filter(d=>!d.needsPrice&&d.profitable&&d.status!=='ordered');
if(readyDeals.length){h+='<div style="font:700 16px \'Plus Jakarta Sans\';margin:18px 0 10px;color:#2E7D32">Step 2: Ready to order ('+readyDeals.length+')</div>';
h+='<div style="font:500 12px \'Plus Jakarta Sans\';color:#7C6F64;margin-bottom:10px">These have verified prices. Tap Order → buy from the source link → ship to prep centre.</div>';
readyDeals.forEach((d,i)=>{const idx=deals.indexOf(d);const pr=d.pr||0;
h+='<div class="card" style="border-left:4px solid #2E7D32"><div style="padding:14px 18px"><div class="title" style="font-size:15px">'+(d.name||'').slice(0,60)+'</div>';
h+='<div class="metrics" style="margin-top:8px"><div class="metric"><div class="metric-label">Buy</div><div class="metric-value" style="font-size:16px;color:#D84315">£'+(d.buyPrice||0).toFixed(2)+'</div></div><div class="metric"><div class="metric-label">Profit</div><div class="metric-value" style="font-size:16px;color:'+(pr>0?'#2E7D32':'#C62828')+'">£'+pr.toFixed(2)+'</div></div><div class="metric"><div class="metric-label">Units</div><div class="metric-value" style="font-size:16px">'+(d.u||0)+'</div></div></div>';
if(d.netAfterTax!==undefined)h+='<div style="font:600 13px \'Plus Jakarta Sans\';color:#2E7D32;margin-top:8px">Net profit: £'+(d.netAfterTax||0).toFixed(2)+' after tax</div>';
// Order button + cheapest source link
const cheapest=d.sources?d.sources[0]:null;
h+='<div style="display:flex;gap:8px;margin-top:10px">';
if(cheapest)h+='<a href="'+cheapest.url+'" target="_blank" class="btn btn-outline" style="flex:1;font-size:13px;padding:10px">Buy from '+(cheapest.name||'source')+' ↗</a>';
h+='<button class="btn btn-blue" style="flex:1;padding:10px;font-size:13px" onclick="decide('+idx+',\'BUY\')">Order ✓</button></div>';
h+='</div></div>';});}

// Pipeline: Ordered items
if(ordered.length){h+='<div style="font:700 16px \'Plus Jakarta Sans\';margin:18px 0 10px;color:#1565C0">Ordered ('+ordered.length+')</div>';
ordered.forEach(i=>{h+='<div class="card" style="padding:14px 18px;border-left:4px solid #1565C0"><div style="display:flex;justify-content:space-between"><div class="title" style="font-size:14px">'+i.name+'</div><span class="pill" style="background:#E3F2FD;color:#1565C0">'+i.units+' units</span></div><div class="g2" style="margin-top:8px"><button class="btn btn-outline" style="padding:8px;font-size:12px" onclick="updateStatus('+i.id+',\'prep\')">Arrived at prep →</button><button class="btn btn-outline" style="padding:8px;font-size:12px" onclick="updateStatus('+i.id+',\'live\')">Live on Amazon →</button></div></div>';});}

if(!needPrice.length&&!readyDeals.length&&!ordered.length)h+='<div class="empty">No deals yet. The scanner runs every 2 hours automatically.'+(S.keepa?'':'<br><br>Add your KEEPA_API_KEY in Railway to enable scanning.')+'</div>';

el.innerHTML=h;}

function renderDeals(el){const deals=S.deals||[];let h='<div class="g2" style="margin-bottom:14px"><button class="btn btn-outline" onclick="doScan()">🔍 Scan now</button><button class="btn btn-outline" onclick="doGmail()" style="color:#ea4335">📧 Check Gmail</button></div>';if(!deals.length)h+='<div class="empty">No deals yet.<br>Click Scan or wait for Gmail alerts.</div>';deals.forEach((d,i)=>{const dc=D[i],ok=d.profitable,np=d.needsPrice;const scC=d.score>=70?'#2E7D32':d.score>=45?'#E65100':'#C62828';const banC=!ok||d.demand?.level==='skip'?'red':d.demand?.level==='caution'?'yellow':'green';h+='<div class="card '+(dc==='BUY'?'approved':dc==='PASS'?'skip':'')+'"><div class="banner '+banC+'">'+(d.rec||'Analysing...')+'</div><div class="deal-head" onclick="EX=EX==='+i+'?null:'+i+';render()"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div class="title">'+(d.name||'Unknown')+'</div>'+(d.reviews?'<div class="stars">★ '+d.reviews+'</div>':'')+'<div class="pills">'+(d.salesRank||d.bsr?'<span class="pill" style="background:'+scC+'15;color:'+scC+'">BSR #'+(d.salesRank||d.bsr)+'</span>':'')+(d.estimatedSales90d?'<span class="pill" style="background:#FFF3E0;color:#E65100">~'+d.estimatedSales90d+' est/90d</span>':'')+(d.passedChecks?'<span class="pill" style="background:#E8F5E9;color:#2E7D32">'+d.passedChecks+'/'+d.totalChecks+' ✓</span>':'')+(d.competition?.level==='risky'?'<span class="pill" style="background:#FFEBEE;color:#C62828">High comp</span>':'')+'</div></div><div style="text-align:center;margin-left:12px"><div style="width:56px;height:56px;border-radius:14px;background:'+scC+'10;display:flex;align-items:center;justify-content:center"><span style="font:800 22px \'IBM Plex Mono\';color:'+scC+'">'+d.score+'</span></div></div></div><div class="metrics"><div class="metric"><div class="metric-label">Buy</div><div class="metric-value" style="color:'+(np?'#E65100':'#D84315')+'">'+(np?'???':'£'+(d.buyPrice||0).toFixed(2))+'</div></div><div class="metric"><div class="metric-label">Sell</div><div class="metric-value" style="color:#E65100">£'+(d.realisticSellPrice||d.sellPrice||0).toFixed(2)+'</div></div><div class="metric"><div class="metric-label">Profit</div><div class="metric-value" style="color:'+(ok?'#2E7D32':'#C62828')+'">'+(np?'—':'£'+(d.pr||0).toFixed(2))+'</div></div></div></div>';if(EX===i){h+='<div class="detail">';if(d.demand){h+='<div class="section"><div class="section-title">📊 DEMAND PROOF</div>';(d.demand.reasons||[]).forEach(r=>{const c=r.includes('✅')||r.includes('massive')||r.includes('excellent')?'pass':r.includes('❌')?'fail':'warn';h+='<div class="check-row '+c+'">'+r+'</div>';});if(d.estimatedSales90d)h+='<div class="check-row pass">~'+d.estimatedSales90d+' est. sales in 90 days (from BSR drops)</div>';if(d.timeToSell)h+='<div class="check-row '+(d.timeToSell<=2?'pass':d.timeToSell<=4?'warn':'fail')+'">Est. '+d.timeToSell+' month(s) to sell '+d.u+' units</div>';h+='</div>';}if(d.competition){h+='<div class="section"><div class="section-title">⚔️ COMPETITION</div>';(d.competition.reasons||[]).forEach(r=>{const c=r.includes('✅')||r.includes('low competition')?'pass':r.includes('❌')?'fail':'warn';h+='<div class="check-row '+c+'">'+r+'</div>';});h+='<div class="bar" style="margin-top:8px"><div class="bar-fill" style="width:'+d.competition.score+'%;background:'+(d.competition.score>=70?'#2E7D32':d.competition.score>=40?'#E65100':'#C62828')+'"></div></div><div style="font:600 11px \'Plus Jakarta Sans\';color:#7C6F64">Competition score: '+d.competition.score+'/100</div>';h+='</div>';}if(d.quality){h+='<div class="section"><div class="section-title">🔬 QUALITY CHECK</div>';h+='<div class="check-row '+(d.quality.qualityScore>=60?'pass':'warn')+'">Review grade: '+(d.quality.reviewAuth?.grade||'?')+' ('+d.quality.qualityScore+'/100)</div>';(d.quality.reviewAuth?.reasons||[]).forEach(r=>{h+='<div class="check-row '+(r.includes('✅')?'pass':r.includes('❌')?'fail':'warn')+'">'+r+'</div>';});h+='<div class="check-row '+(d.quality.returnRate?.level==='excellent'||d.quality.returnRate?.level==='good'?'pass':'warn')+'">'+(d.quality.returnRate?.message||'')+'</div>';h+='<div class="check-row '+(d.quality.privateLabel?.isPrivateLabel?'fail':'pass')+'">'+(d.quality.privateLabel?.message||'')+'</div>';h+='<div class="check-row '+(d.quality.season?.peak?'pass':'warn')+'">'+(d.quality.season?.message||'')+'</div>';if(d.quality.reviewMeta)h+='<a href="'+d.quality.reviewMeta+'" target="_blank" class="btn btn-outline" style="margin-top:8px;font-size:13px;padding:10px">🔍 Check ReviewMeta</a>';if(d.quality.youtube)h+='<a href="'+d.quality.youtube.searchUrl+'" target="_blank" class="btn btn-outline" style="margin-top:6px;font-size:13px;padding:10px">▶️ YouTube Reviews</a>';h+='</div>';}if(d.note)h+='<div class="info-box info-blue">'+d.note+'</div>';if(np){h+='<div class="info-box info-yellow"><div style="margin-bottom:8px">⚠️ Enter buy price from sources below:</div><div class="g2"><input class="inp" id="bp'+i+'" type="number" step="0.01" placeholder="£ price"><button class="btn btn-blue" onclick="setPrice('+i+')">Set</button></div></div>';}if(!np&&(d.amz||d.amazon)){const a=d.amz||d.amazon,p=d.prep||d.p;h+='<div class="section"><div class="section-title">💰 TRUE COST BREAKDOWN</div>';h+='<div class="cost-row"><span class="label">Product</span><span class="value">£'+(d.buyPrice||0).toFixed(2)+'</span></div>';if(d.isChina){h+='<div class="cost-row"><span class="label">Import VAT (20%)</span><span class="value">£'+(d.importVAT||0).toFixed(2)+'</span></div>';h+='<div class="cost-row"><span class="label">Import duty (~4%)</span><span class="value">£'+(d.importDuty||0).toFixed(2)+'</span></div>';}h+='<div class="cost-row"><span class="label">Prep (label+box)</span><span class="value">£'+(p?.t||0).toFixed(2)+'</span></div>';h+='<div class="cost-row"><span class="label">Referral ('+(a?.rr||'?')+')</span><span class="value">£'+(a?.rf||0).toFixed(2)+'</span></div>';h+='<div class="cost-row"><span class="label">FBA fulfilment</span><span class="value">£'+(a?.ff||0).toFixed(2)+'</span></div>';h+='<div class="cost-row"><span class="label">Storage ('+d.timeToSell+'mo)</span><span class="value">£'+(d.totalStorage||0).toFixed(2)+'</span></div>';if(d.realisticSellPrice&&d.rawSellPrice&&d.realisticSellPrice<d.rawSellPrice)h+='<div style="font:500 11px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:4px">Sell price adjusted from £'+d.rawSellPrice.toFixed(2)+' → £'+d.realisticSellPrice.toFixed(2)+' (Buy Box competition)</div>';const tc=d.tc||0,pr=d.pr||0;h+='<div style="margin-top:8px"><div class="cost-row"><span class="label" style="color:#C62828;font-weight:700">Total cost/unit</span><span class="value" style="color:#C62828">£'+tc.toFixed(2)+'</span></div><div style="height:2px;background:#E8E0D8;margin:8px 0"></div><div class="profit-row"><span class="label" style="color:'+(pr>0?'#2E7D32':'#C62828')+'">PROFIT/UNIT</span><span class="value" style="color:'+(pr>0?'#2E7D32':'#C62828')+'">£'+pr.toFixed(2)+'</span></div><div style="font:500 12px \'Plus Jakarta Sans\';color:#7C6F64">Margin: '+d.mg+'% · ROI: '+d.roi+'%</div></div></div>';h+='<div class="info-box info-green"><div>£'+S.budget+' → '+d.u+' units</div>';if(d.returnCost>0)h+='<div style="margin-top:4px">Returns (~'+(d.quality?.returnRate?.rate||0)+'%): -£'+d.returnCost.toFixed(2)+'</div>';h+='<div style="margin-top:4px">Batch profit: £'+(d.adjustedBatchProfit||0).toFixed(2)+'</div>';if(d.incomeTax>0||d.nationalInsurance>0)h+='<div style="margin-top:4px">Tax+NI: -£'+((d.incomeTax||0)+(d.nationalInsurance||0)).toFixed(2)+'</div>';h+='<div style="margin-top:4px;font-size:16px;font-weight:800">Net: £'+(d.netAfterTax||0).toFixed(2)+'</div></div>';if(d.reinvestment?.length){h+='<div class="section"><div class="section-title">📈 GROWTH (realistic cycles)</div>';d.reinvestment.forEach(m=>{h+='<div class="cost-row"><span class="label">Cycle '+m.cycle+' (~mo '+m.month+')</span><span class="value" style="color:#2E7D32">£'+m.total.toFixed(0)+'</span></div>';});h+='</div>';}}if(d.sources?.length){h+='<div class="section"><div class="section-title">🌍 BUY FROM</div>';d.sources.forEach(s=>{h+='<div class="source"><div><span>'+((s.region||s.r)||'')+' </span><a href="'+s.url+'" target="_blank">'+(s.name||s.n)+' ↗</a></div><span class="meta">'+(s.ship||s.s||'')+' · '+(s.days||s.d||'')+'</span></div>';});h+='</div>';}if(d.risks?.length)d.risks.forEach(r=>{h+='<div class="risk">⚠ '+r+'</div>';});if(d.amzUrl)h+='<a href="'+d.amzUrl+'" target="_blank" class="btn btn-outline" style="margin:10px 0">View on Amazon UK ↗</a>';if(!np)h+='<div class="g2" style="margin-top:10px"><button class="btn btn-green '+(dc==='BUY'?'on':'')+'" onclick="decide('+i+',\'BUY\')">'+(dc==='BUY'?'✓ Approved':'✅ Approve')+'</button><button class="btn btn-skip '+(dc==='PASS'?'on':'')+'" onclick="decide('+i+',\'PASS\')">'+(dc==='PASS'?'✗ Skipped':'❌ Skip')+'</button></div>';h+='</div>';}h+='</div>';});el.innerHTML=h;}
function renderStock(el){const inv=S.inventory||[];let totalInv=0,totalRev=0,totalProf=0,totalUnits=0,totalSold=0,totalRet=0;inv.forEach(i=>{totalInv+=(i.units||0)*(i.buyPrice||0);totalRev+=(i.revenue||0);totalProf+=(i.realProfit||0);totalUnits+=(i.units||0);totalSold+=(i.sold||0);totalRet+=(i.returnCount||0);});const roi=totalInv>0?((totalProf/totalInv)*100).toFixed(0):0;let h='<div style="font:800 20px \'Plus Jakarta Sans\';margin-bottom:14px">Stock & P&L</div>';if(inv.length){h+='<div class="card" style="padding:16px;margin-bottom:14px"><div class="section-title">PORTFOLIO DASHBOARD</div><div class="metrics"><div class="metric"><div class="metric-label">Invested</div><div class="metric-value" style="color:#D84315">£'+totalInv.toFixed(0)+'</div></div><div class="metric"><div class="metric-label">Revenue</div><div class="metric-value" style="color:#2E7D32">£'+totalRev.toFixed(0)+'</div></div><div class="metric"><div class="metric-label">Profit</div><div class="metric-value" style="color:'+(totalProf>=0?'#2E7D32':'#C62828')+'">£'+totalProf.toFixed(0)+'</div></div></div><div class="metrics" style="margin-top:8px"><div class="metric"><div class="metric-label">Units</div><div class="metric-value">'+totalUnits+'</div></div><div class="metric"><div class="metric-label">Sold</div><div class="metric-value" style="color:#2E7D32">'+totalSold+'</div></div><div class="metric"><div class="metric-label">ROI</div><div class="metric-value" style="color:'+(roi>=0?'#2E7D32':'#C62828')+'">'+roi+'%</div></div></div><button class="btn btn-outline" style="margin-top:12px" onclick="doPriceCheck()">Check live prices</button></div>';}if(!inv.length)h+='<div class="empty">No stock yet. Approve a deal to track.</div>';else inv.forEach(i=>{const d=i.days||0,c=d<=270?'#2E7D32':d<=365?'#E65100':'#C62828',pct=Math.min((d/365)*100,100);const sold=i.sold||0,ret=i.returnCount||0,rem=i.remaining||i.units||0;const hasAlert=i.priceAlert;h+='<div class="card" style="padding:16px;border-left:4px solid '+c+'">';if(hasAlert)h+='<div class="info-box '+(i.currentAmazonPrice<i.sellPrice?'info-yellow':'info-green')+'" style="margin:0 0 10px;font-size:12px">'+i.priceAlert+'</div>';h+='<div style="display:flex;justify-content:space-between"><div><div style="font:700 16px \'Plus Jakarta Sans\'">'+i.name+'</div><div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">'+rem+' left of '+i.units+' · '+sold+' sold'+(ret?' · '+ret+' returned':'')+'</div></div><div style="font:800 24px \'IBM Plex Mono\';color:'+c+'">'+d+'d</div></div><div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+c+'"></div></div><div style="display:flex;justify-content:space-between;margin-top:8px"><div style="font:600 12px \'Plus Jakarta Sans\';color:'+c+'">'+(i.surcharge?.msg||i.surcharge?.message||'Safe')+'</div><div style="font:700 14px \'IBM Plex Mono\';color:'+(i.realProfit>=0?'#2E7D32':'#C62828')+'">£'+(i.realProfit||0).toFixed(2)+'</div></div><div class="g2" style="margin-top:10px"><button class="btn btn-outline" style="padding:8px;font-size:13px" onclick="recordSale('+i.id+')">+ Sale</button><button class="btn btn-outline" style="padding:8px;font-size:13px;color:#C62828" onclick="recordReturn('+i.id+')">+ Return</button></div></div>';});el.innerHTML=h;}
function renderSetup(el){el.innerHTML='<div style="font:800 20px \'Plus Jakarta Sans\';margin-bottom:14px">Setup & How It Works</div><div class="card" style="padding:18px"><div class="section-title">HOW THIS MAKES MONEY</div><div class="check-row pass">1. App auto-scans 12 Amazon UK categories every 2 hours</div><div class="check-row pass">2. Finds high-demand products you can buy cheap from China</div><div class="check-row pass">3. You check AliExpress/Alibaba, enter buy price</div><div class="check-row pass">4. App shows true profit after ALL fees, tax, returns</div><div class="check-row pass">5. You order → ship to prep centre → prep sends to Amazon FBA</div><div class="check-row pass">6. Amazon handles storage, shipping, returns. You get paid.</div></div><div class="card" style="padding:18px;margin-top:12px"><div class="section-title">STATUS</div>'+[['Scanner','12 categories / 2hr',S.keepa],['Keepa API',S.keepa?'Connected':'ADD KEY IN RAILWAY',S.keepa],['Gmail alerts',S.gmail?'Active':'Optional',S.gmail||true],['Fee engine','2026 UK rates',true],['Quality check','Reviews + returns + season',true],['Competition','Sellers + price stability',true],['Price monitor','Every 4 hours',true],['Sources','11 global sites',true]].map(([n,s,ok])=>'<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #E8E0D8"><span style="font:600 14px \'Plus Jakarta Sans\'">'+n+'</span><span class="pill" style="background:'+(ok?'#E8F5E9':'#FFEBEE')+';color:'+(ok?'#2E7D32':'#C62828')+'">'+s+'</span></div>').join('')+'</div><div class="card" style="padding:18px;margin-top:12px"><div class="section-title">COSTS (monthly)</div>'+[['Amazon Seller UK','£25/mo','https://sellercentral.amazon.co.uk'],['Keepa API','€19/mo (~£17)','https://keepa.com'],['Prep Centre','~£0.50/unit','https://prep365.co.uk'],['Railway hosting','Free tier','https://railway.app']].map(([n,c,u])=>'<a href="'+u+'" target="_blank" style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #E8E0D8;text-decoration:none"><span style="font:600 14px \'Plus Jakarta Sans\';color:#2D2016">'+n+' ↗</span><span style="font:700 13px \'IBM Plex Mono\';color:#D84315">'+c+'</span></a>').join('')+'<div style="font:600 13px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:10px">Total startup: ~£42/mo + stock budget (£200+)</div></div>';}
async function doGmail(){try{await fetch('/api/gmail/check',{method:'POST'});await load();}catch(e){}}
async function doScan(){try{await fetch('/api/scan',{method:'POST'});setTimeout(load,5000);}catch(e){}}
async function quickScan(){const asin=document.getElementById('scanAsin').value.trim().toUpperCase();if(!asin||asin.length!==10){SCAN_RESULT={error:'Enter a valid 10-character ASIN'};render();return;}const bp=parseFloat(document.getElementById('scanPrice').value)||null;const src=document.getElementById('scanSource').value||'';document.getElementById('scanBtn').textContent='Scanning...';document.getElementById('scanBtn').disabled=true;try{const r=await fetch('/api/quick-scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({asin,buyPrice:bp,source:src})});SCAN_RESULT=await r.json();await load();}catch(e){SCAN_RESULT={error:'Failed to scan — check connection'};}document.getElementById('scanBtn').textContent='Scan product';document.getElementById('scanBtn').disabled=false;render();}
async function addManual(){const name=document.getElementById('manName').value;const bp=parseFloat(document.getElementById('manBuy').value);const sp=parseFloat(document.getElementById('manSell').value);if(!name||!bp||!sp){alert('Fill in name, buy and sell price');return;}const wt=parseFloat(document.getElementById('manWeight').value)||0.3;const cat=document.getElementById('manCat').value;const asin=document.getElementById('manAsin').value.trim().toUpperCase()||null;await fetch('/api/deals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,buyPrice:bp,sellPrice:sp,weightKg:wt,category:cat,asin,from:'Manual entry',needsPrice:false})});document.getElementById('manName').value='';document.getElementById('manBuy').value='';document.getElementById('manSell').value='';document.getElementById('manAsin').value='';await load();TAB='deals';render();}
async function doPriceCheck(){try{const r=await fetch('/api/price-check',{method:'POST'});const d=await r.json();alert(d.msg);await load();}catch(e){}}
async function updateStatus(id,status){await fetch('/api/inventory/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});await load();}
function decide(i,d){D[i]=d;if(d==='BUY')fetch('/api/approve/'+i,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})}).then(load);render();}
async function setPrice(i){const v=parseFloat(document.getElementById('bp'+i).value);if(!v)return;const deal=S.deals[i];await fetch('/api/deals/'+deal.id+'/price',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyPrice:v})});await load();}
async function recordSale(id){const u=prompt('Units sold:','1');if(!u)return;const p=prompt('Actual sell price (£):');if(!p)return;await fetch('/api/inventory/'+id+'/sale',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({units:parseInt(u),actualPrice:parseFloat(p)})});await load();}
async function recordReturn(id){const u=prompt('Units returned:','1');if(!u)return;const r=prompt('Reason (optional):','');await fetch('/api/inventory/'+id+'/return',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({units:parseInt(u),reason:r})});await load();}
load();setInterval(load,30000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');
</script>
