<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FBA Brain">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8f9fb">
<link rel="manifest" href="/manifest.json">
<title>FBA Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f9fb;color:#1a1d26;font-family:'Plus Jakarta Sans',sans-serif}
.hdr{background:#fff;border-bottom:1px solid #e8eaee;padding:16px 20px 0;position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:4px;margin-top:12px}.tab{flex:1;padding:12px 0;background:0;border:0;border-bottom:3px solid transparent;color:#9ca3af;font:600 13px 'Plus Jakarta Sans';cursor:pointer}.tab.on{color:#2563eb;border-color:#2563eb}
.ct{padding:16px 18px;max-width:560px;margin:0 auto}
.card{background:#fff;border-radius:16px;border:1px solid #e8eaee;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card.approved{border-color:#22c55e}.card.skip{opacity:.35}
.banner{padding:12px 18px;font:700 14px 'Plus Jakarta Sans';border-bottom:1px solid #f1f3f5}
.banner.green{background:#f0fdf4;color:#16a34a}.banner.red{background:#fef2f2;color:#dc2626}.banner.yellow{background:#fffbeb;color:#d97706}
.deal-head{padding:16px 18px;cursor:pointer}
.title{font:700 17px/1.3 'Plus Jakarta Sans'}.stars{font:500 13px 'Plus Jakarta Sans';color:#f59e0b;margin-top:4px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{font:700 11px 'Plus Jakarta Sans';padding:4px 10px;border-radius:8px}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.metric{background:#f8f9fb;border-radius:12px;padding:10px 8px;text-align:center}
.metric-label{font:600 10px 'Plus Jakarta Sans';color:#9ca3af;letter-spacing:.5px}.metric-value{font:700 20px 'IBM Plex Mono';margin-top:4px}
.detail{padding:0 18px 18px;border-top:1px solid #f1f3f5}
.section{background:#f8f9fb;border-radius:12px;padding:14px;margin:10px 0}
.section-title{font:700 12px 'Plus Jakarta Sans';color:#2563eb;margin-bottom:8px}
.check-row{font:500 14px/1.6 'Plus Jakarta Sans';color:#4b5563;padding:4px 0 4px 8px;border-left:3px solid #e8eaee;margin-bottom:4px}
.check-row.pass{border-color:#22c55e;color:#15803d}.check-row.fail{border-color:#dc2626;color:#dc2626}.check-row.warn{border-color:#f59e0b;color:#92400e}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f3f5;font:500 14px 'Plus Jakarta Sans'}
.cost-row .label{color:#6b7280}.cost-row .value{font:600 14px 'IBM Plex Mono'}
.profit-row{display:flex;justify-content:space-between;padding:10px 0;margin-top:4px}
.profit-row .label{font:800 16px 'Plus Jakarta Sans'}.profit-row .value{font:800 24px 'IBM Plex Mono'}
.source{background:#fff;border:1px solid #e8eaee;border-radius:10px;padding:10px 14px;margin:4px 0;display:flex;justify-content:space-between;align-items:center}
.source a{color:#2563eb;text-decoration:none;font:600 14px 'Plus Jakarta Sans'}.source .meta{font:500 12px 'Plus Jakarta Sans';color:#9ca3af}
.risk{font:500 13px/1.5 'Plus Jakarta Sans';color:#d97706;padding:6px 0 6px 10px;border-left:3px solid #fde68a;margin:4px 0}
.btn{padding:14px 20px;border-radius:12px;font:700 15px 'Plus Jakarta Sans';cursor:pointer;border:2px solid transparent;width:100%;text-align:center;display:block}
.btn-blue{background:#2563eb;color:#fff;border-color:#2563eb;text-decoration:none}
.btn-green{background:#fff;color:#22c55e;border-color:#22c55e}.btn-green.on{background:#22c55e;color:#fff}
.btn-skip{background:#fff;color:#9ca3af;border-color:#e8eaee}.btn-skip.on{background:#fef2f2;color:#dc2626;border-color:#dc2626}
.btn-outline{background:#fff;border:1.5px solid #e8eaee;color:#2563eb;padding:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-box{border-radius:12px;padding:12px 16px;margin:8px 0;font:600 14px/1.5 'Plus Jakarta Sans'}
.info-green{background:#f0fdf4;color:#16a34a}.info-yellow{background:#fffbeb;color:#92400e}.info-blue{background:#eff6ff;color:#1d4ed8}
.bar{height:6px;background:#e8eaee;border-radius:3px;overflow:hidden;margin:6px 0}.bar-fill{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px 20px;color:#9ca3af;font:500 15px 'Plus Jakarta Sans'}
.inp{width:100%;padding:14px 16px;background:#f8f9fb;border:1.5px solid #e8eaee;border-radius:12px;color:#1a1d26;font:500 15px 'Plus Jakarta Sans';outline:none}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:#e8eaee;border-radius:3px;outline:none;margin:8px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#2563eb;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.status-bar{background:#fff;border:1px solid #e8eaee;border-radius:10px;padding:12px 16px;margin-bottom:12px;font:500 13px 'Plus Jakarta Sans';color:#6b7280;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="hdr">
 <div style="display:flex;justify-content:space-between;align-items:center">
  <div><div style="font:800 22px 'Plus Jakarta Sans'">FBA Brain</div><div id="status" style="font:500 12px 'Plus Jakarta Sans';color:#9ca3af;margin-top:2px">Loading...</div></div>
  <div style="text-align:right"><div style="font:500 11px 'Plus Jakarta Sans';color:#9ca3af">BUDGET</div><div id="budgetN" style="font:800 26px 'IBM Plex Mono';color:#22c55e">£200</div></div>
 </div>
 <input type="range" id="budgetR" min="100" max="2000" step="50" value="200">
 <div class="tabs"><button class="tab on" data-t="deals">Deals</button><button class="tab" data-t="alerts" id="atab">Alerts</button><button class="tab" data-t="stock">Stock</button><button class="tab" data-t="setup">Setup</button></div>
</div>
<div class="ct" id="main"></div>
<script>
let S={deals:[],inventory:[],alerts:[],budget:200},D={},EX=null,TAB='deals';
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');TAB=t.dataset.t;render();});
const sl=document.getElementById('budgetR');
sl.oninput=()=>{S.budget=+sl.value;document.getElementById('budgetN').textContent='£'+S.budget;render();fetch('/api/budget',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({budget:S.budget})});};
async function load(){try{const r=await fetch('/api/state');S=await r.json();sl.value=S.budget||200;document.getElementById('budgetN').textContent='£'+(S.budget||200);document.getElementById('status').textContent=S.lastGmailCheck?'📧 '+new Date(S.lastGmailCheck).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' · Auto/2min':'📧 Waiting...';document.getElementById('atab').textContent='Alerts'+((S.alerts||[]).length?' ('+S.alerts.length+')':'');render();}catch(e){document.getElementById('main').innerHTML='<div class="empty">Connecting...</div>';}}
function render(){const el=document.getElementById('main');if(TAB==='deals')renderDeals(el);else if(TAB==='alerts')renderAlerts(el);else if(TAB==='stock')renderStock(el);else renderSetup(el);}
function renderDeals(el){const deals=S.deals||[];let h='<div class="g2" style="margin-bottom:14px"><button class="btn btn-outline" onclick="doScan()">🔍 Scan now</button><button class="btn btn-outline" onclick="doGmail()" style="color:#ea4335">📧 Check Gmail</button></div>';if(!deals.length)h+='<div class="empty">No deals yet.<br>Click Scan or wait for Gmail alerts.</div>';deals.forEach((d,i)=>{const dc=D[i],ok=d.profitable,np=d.needsPrice;const scC=d.score>=70?'#22c55e':d.score>=45?'#f59e0b':'#dc2626';const banC=!ok||d.demand?.level==='skip'?'red':d.demand?.level==='caution'?'yellow':'green';h+='<div class="card '+(dc==='BUY'?'approved':dc==='PASS'?'skip':'')+'"><div class="banner '+banC+'">'+(d.rec||'Analysing...')+'</div><div class="deal-head" onclick="EX=EX==='+i+'?null:'+i+';render()"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div class="title">'+(d.name||'Unknown')+'</div>'+(d.reviews?'<div class="stars">★ '+d.reviews+'</div>':'')+'<div class="pills">'+(d.salesRank||d.bsr?'<span class="pill" style="background:'+scC+'15;color:'+scC+'">BSR #'+(d.salesRank||d.bsr)+'</span>':'')+(d.confirmedSales90d?'<span class="pill" style="background:#eff6ff;color:#2563eb">'+d.confirmedSales90d+'+ sales</span>':'')+(d.passedChecks?'<span class="pill" style="background:#f0fdf4;color:#16a34a">'+d.passedChecks+'/'+d.totalChecks+' ✓</span>':'')+'</div></div><div style="text-align:center;margin-left:12px"><div style="width:56px;height:56px;border-radius:14px;background:'+scC+'10;display:flex;align-items:center;justify-content:center"><span style="font:800 22px \'IBM Plex Mono\';color:'+scC+'">'+d.score+'</span></div></div></div><div class="metrics"><div class="metric"><div class="metric-label">Buy</div><div class="metric-value" style="color:'+(np?'#f59e0b':'#2563eb')+'">'+(np?'???':'£'+(d.buyPrice||0).toFixed(2))+'</div></div><div class="metric"><div class="metric-label">Sell</div><div class="metric-value" style="color:#f59e0b">£'+(d.sellPrice||0).toFixed(2)+'</div></div><div class="metric"><div class="metric-label">Profit</div><div class="metric-value" style="color:'+(ok?'#22c55e':'#dc2626')+'">'+(np?'—':'£'+(d.pr||d.profit||0).toFixed(2))+'</div></div></div></div>';if(EX===i){h+='<div class="detail">';if(d.demand){h+='<div class="section"><div class="section-title">📊 DEMAND PROOF</div>';(d.demand.reasons||[]).forEach(r=>{const c=r.includes('✅')||r.includes('massive')||r.includes('excellent')?'pass':r.includes('❌')?'fail':'warn';h+='<div class="check-row '+c+'">'+r+'</div>';});if(d.confirmedSales90d)h+='<div class="check-row pass">🔢 '+d.confirmedSales90d+'+ confirmed sales in 90 days</div>';h+='</div>';}if(d.quality){h+='<div class="section"><div class="section-title">🔬 QUALITY CHECK</div>';h+='<div class="check-row '+(d.quality.qualityScore>=60?'pass':'warn')+'">Review grade: '+(d.quality.reviewAuth?.grade||'?')+' ('+d.quality.qualityScore+'/100)</div>';(d.quality.reviewAuth?.reasons||[]).forEach(r=>{h+='<div class="check-row '+(r.includes('✅')?'pass':r.includes('❌')?'fail':'warn')+'">'+r+'</div>';});h+='<div class="check-row '+(d.quality.returnRate?.level==='excellent'||d.quality.returnRate?.level==='good'?'pass':'warn')+'">'+(d.quality.returnRate?.message||'')+'</div>';h+='<div class="check-row '+(d.quality.privateLabel?.isPrivateLabel?'fail':'pass')+'">'+(d.quality.privateLabel?.message||'')+'</div>';h+='<div class="check-row '+(d.quality.season?.peak?'pass':'warn')+'">'+(d.quality.season?.message||'')+'</div>';if(d.quality.reviewMeta)h+='<a href="'+d.quality.reviewMeta+'" target="_blank" class="btn btn-outline" style="margin-top:8px;font-size:13px;padding:10px">🔍 Check ReviewMeta</a>';if(d.quality.youtube)h+='<a href="'+d.quality.youtube.searchUrl+'" target="_blank" class="btn btn-outline" style="margin-top:6px;font-size:13px;padding:10px">▶️ YouTube Reviews</a>';h+='</div>';}if(d.note)h+='<div class="info-box info-blue">'+d.note+'</div>';if(np){h+='<div class="info-box info-yellow"><div style="margin-bottom:8px">⚠️ Enter buy price from sources below:</div><div class="g2"><input class="inp" id="bp'+i+'" type="number" step="0.01" placeholder="£ price"><button class="btn btn-blue" onclick="setPrice('+i+')">Set</button></div></div>';}if(!np&&(d.amz||d.amazon)){const a=d.amz||d.amazon,p=d.prep||d.p;h+='<div class="section"><div class="section-title">💰 COST BREAKDOWN</div>';[['Product',d.buyPrice],['Label',p?.l||p?.labelFee],['Box+ship',p?.b||p?.boxForward],['Referral ('+(a?.rr||a?.referralRate)+')',a?.rf||a?.referralFee],['FBA fee',a?.ff||a?.fbaFee],['Storage',a?.sf||a?.storageFee]].forEach(([l,v])=>{h+='<div class="cost-row"><span class="label">'+l+'</span><span class="value">£'+(v||0).toFixed(2)+'</span></div>';});const tc=d.tc||d.totalCost||0,pr=d.pr||d.profit||0;h+='<div style="margin-top:8px"><div class="cost-row"><span class="label" style="color:#dc2626;font-weight:700">Total cost</span><span class="value" style="color:#dc2626">£'+tc.toFixed(2)+'</span></div><div style="height:2px;background:#e8eaee;margin:8px 0"></div><div class="profit-row"><span class="label" style="color:'+(pr>0?'#22c55e':'#dc2626')+'">PROFIT</span><span class="value" style="color:'+(pr>0?'#22c55e':'#dc2626')+'">£'+pr.toFixed(2)+'</span></div></div></div>';if(d.netAfterTax!==undefined)h+='<div class="info-box info-green"><div>£'+S.budget+' → '+d.u+' units → £'+(d.adjustedBatchProfit||d.bpr||0).toFixed(2)+' gross</div><div style="margin-top:4px">Tax: -£'+((d.incomeTax||0)+(d.nationalInsurance||0)).toFixed(2)+'</div><div style="margin-top:4px;font-size:16px;font-weight:800">Net: £'+(d.netAfterTax||0).toFixed(2)+'</div></div>';else h+='<div class="info-box info-green">£'+S.budget+' → '+d.u+' units → £'+(d.bpr||0).toFixed(2)+' profit ('+d.roi+'% ROI)</div>';if(d.reinvestment?.length){h+='<div class="section"><div class="section-title">📈 GROWTH</div>';d.reinvestment.forEach(m=>{h+='<div class="cost-row"><span class="label">Month '+m.month+'</span><span class="value" style="color:#22c55e">£'+m.total.toFixed(0)+'</span></div>';});h+='</div>';}}if(d.sources?.length){h+='<div class="section"><div class="section-title">🌍 BUY FROM</div>';d.sources.forEach(s=>{h+='<div class="source"><div><span>'+((s.region||s.r)||'')+' </span><a href="'+s.url+'" target="_blank">'+(s.name||s.n)+' ↗</a></div><span class="meta">'+(s.ship||s.s||'')+' · '+(s.days||s.d||'')+'</span></div>';});h+='</div>';}if(d.risks?.length)d.risks.forEach(r=>{h+='<div class="risk">⚠ '+r+'</div>';});if(d.amzUrl)h+='<a href="'+d.amzUrl+'" target="_blank" class="btn btn-outline" style="margin:10px 0">View on Amazon UK ↗</a>';if(!np)h+='<div class="g2" style="margin-top:10px"><button class="btn btn-green '+(dc==='BUY'?'on':'')+'" onclick="decide('+i+',\'BUY\')">'+(dc==='BUY'?'✓ Approved':'✅ Approve')+'</button><button class="btn btn-skip '+(dc==='PASS'?'on':'')+'" onclick="decide('+i+',\'PASS\')">'+(dc==='PASS'?'✗ Skipped':'❌ Skip')+'</button></div>';h+='</div>';}h+='</div>';});el.innerHTML=h;}
function renderAlerts(el){const a=S.alerts||[];let h='<div class="status-bar"><span>'+(S.lastGmailCheck?'Last: '+new Date(S.lastGmailCheck).toLocaleTimeString('en-GB'):'Not checked')+'</span><span style="color:#22c55e">Auto every 2 min</span></div><button class="btn btn-outline" onclick="doGmail()" style="color:#ea4335;margin-bottom:14px">📧 Check now</button>';if(!a.length)h+='<div class="empty">No alerts yet.<br>Set Tactical Arbitrage to email your Gmail.</div>';else a.forEach(x=>{h+='<div style="background:#fff;border-radius:14px;border:1px solid #e8eaee;padding:16px;margin-bottom:10px"><div style="font:700 15px \'Plus Jakarta Sans\'">'+(x.subject||'Alert')+'</div><div style="font:500 12px \'Plus Jakarta Sans\';color:#9ca3af;margin-top:2px">'+(x.from||'')+'</div>'+(x.snippet?'<div style="font:500 14px \'Plus Jakarta Sans\';color:#4b5563;margin-top:6px">'+x.snippet+'</div>':'')+'</div>';});el.innerHTML=h;}
function renderStock(el){const inv=S.inventory||[];let h='<div style="font:800 20px \'Plus Jakarta Sans\';margin-bottom:14px">Inventory</div>';if(!inv.length)h+='<div class="empty">No stock yet. Approve a deal to track.</div>';else inv.forEach(i=>{const d=i.days||i.daysInStorage||0,c=d<=270?'#22c55e':d<=365?'#f59e0b':'#dc2626',pct=Math.min((d/365)*100,100);h+='<div class="card" style="padding:16px;border-left:4px solid '+c+'"><div style="display:flex;justify-content:space-between"><div><div style="font:700 16px \'Plus Jakarta Sans\'">'+i.name+'</div><div style="font:500 13px \'Plus Jakarta Sans\';color:#6b7280">'+i.units+' units · £'+(i.buyPrice||0).toFixed(2)+'/ea</div></div><div style="font:800 24px \'IBM Plex Mono\';color:'+c+'">'+d+'d</div></div><div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+c+'"></div></div><div style="font:600 12px \'Plus Jakarta Sans\';color:'+c+'">'+(i.surcharge?.msg||i.surcharge?.message||'Safe')+'</div></div>';});el.innerHTML=h;}
function renderSetup(el){el.innerHTML='<div style="font:800 20px \'Plus Jakarta Sans\';margin-bottom:14px">Setup</div><div class="card" style="padding:18px"><div style="font:700 16px \'Plus Jakarta Sans\';margin-bottom:12px">Connected</div>'+[['📧 Gmail',S.gmail?'Active':'Not set',S.gmail],['📊 Keepa',S.keepa?'Connected':'Add key',S.keepa],['💰 Fees','2026 UK rates',true],['🔬 Quality','Active',true],['📦 Tracker','Active',true],['🌍 Sources','11 sites',true]].map(([n,s,ok])=>'<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f3f5"><span style="font:600 14px \'Plus Jakarta Sans\'">'+n+'</span><span class="pill" style="background:'+(ok?'#f0fdf4':'#fffbeb')+';color:'+(ok?'#16a34a':'#d97706')+'">'+s+'</span></div>').join('')+'</div><div class="card" style="padding:18px;margin-top:12px"><div style="font:700 16px \'Plus Jakarta Sans\';margin-bottom:12px">Subscriptions</div>'+[['Amazon Seller UK','£25/mo','https://sellercentral.amazon.co.uk'],['Keepa','€19/mo','https://keepa.com'],['Seller 365','£55/mo','https://www.threecolts.com/seller-365'],['Prep Centre','£0.50/unit','https://prep365.co.uk']].map(([n,c,u])=>'<a href="'+u+'" target="_blank" style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f3f5;text-decoration:none"><span style="font:600 14px \'Plus Jakarta Sans\';color:#1a1d26">'+n+' ↗</span><span style="font:700 14px \'IBM Plex Mono\';color:#22c55e">'+c+'</span></a>').join('')+'</div>';}
async function doGmail(){try{await fetch('/api/gmail/check',{method:'POST'});await load();}catch(e){}}
async function doScan(){try{await fetch('/api/scan',{method:'POST'});setTimeout(load,5000);}catch(e){}}
function decide(i,d){D[i]=d;if(d==='BUY')fetch('/api/approve/'+i,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})}).then(load);render();}
async function setPrice(i){const v=parseFloat(document.getElementById('bp'+i).value);if(!v)return;const deal=S.deals[i];await fetch('/api/deals/'+deal.id+'/price',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyPrice:v})});await load();}
load();setInterval(load,30000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
