<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FBA Brain">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D84315">
<link rel="manifest" href="/manifest.json">
<title>FBA Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#D84315}
body{background:#FBF8F6;color:#2D2016;font-family:'Plus Jakarta Sans',sans-serif;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}
.hdr{background:linear-gradient(135deg,#D84315,#BF360C);padding:calc(env(safe-area-inset-top,18px) + 8px) 20px 0 20px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(216,67,21,.25)}
.tabs{display:flex;gap:4px;margin-top:14px}.tab{flex:1;padding:14px 0;background:0;border:0;border-bottom:3px solid transparent;color:rgba(255,255,255,.55);font:600 13px 'Plus Jakarta Sans';cursor:pointer;transition:all .2s ease;letter-spacing:.3px;min-height:44px}.tab.on{color:#fff;border-color:#fff;opacity:1}.tab:hover,.tab:active{color:rgba(255,255,255,.85)}
.ct{padding:18px 18px calc(32px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
.card{background:#fff;border-radius:14px;border:1px solid #E8E0D8;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(45,32,22,.06),0 4px 12px rgba(45,32,22,.03);transition:box-shadow .2s ease}
.card.approved{border-color:#2E7D32;box-shadow:0 1px 4px rgba(46,125,50,.12),0 4px 12px rgba(46,125,50,.06)}.card.skip{opacity:.35}
.banner{padding:13px 18px;font:700 14px 'Plus Jakarta Sans';border-bottom:1px solid rgba(0,0,0,.04)}
.banner.green{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);color:#2E7D32}.banner.red{background:linear-gradient(135deg,#FFEBEE,#FBE9E7);color:#C62828}.banner.yellow{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);color:#E65100}
.deal-head{padding:16px 18px;cursor:pointer}
.title{font:700 17px/1.3 'Plus Jakarta Sans';color:#2D2016}.stars{font:500 13px 'Plus Jakarta Sans';color:#FF8A65;margin-top:4px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{font:700 11px 'Plus Jakarta Sans';padding:4px 10px;border-radius:8px}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.metric{background:#FBF8F6;border-radius:12px;padding:10px 8px;text-align:center;border:1px solid #E8E0D8}
.metric-label{font:600 10px 'Plus Jakarta Sans';color:#7C6F64;letter-spacing:.5px;text-transform:uppercase}.metric-value{font:700 20px 'IBM Plex Mono';margin-top:4px}
.detail{padding:0 18px 18px;border-top:1px solid #E8E0D8}
.section{background:#FBF8F6;border-radius:12px;padding:14px;margin:10px 0;border:1px solid #E8E0D8}
.section-title{font:700 12px 'Plus Jakarta Sans';color:#D84315;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.check-row{font:500 14px/1.6 'Plus Jakarta Sans';color:#7C6F64;padding:4px 0 4px 8px;border-left:3px solid #E8E0D8;margin-bottom:4px}
.check-row.pass{border-color:#2E7D32;color:#2E7D32}.check-row.fail{border-color:#C62828;color:#C62828}.check-row.warn{border-color:#E65100;color:#E65100}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E8E0D8;font:500 14px 'Plus Jakarta Sans'}
.cost-row .label{color:#7C6F64}.cost-row .value{font:600 14px 'IBM Plex Mono'}
.profit-row{display:flex;justify-content:space-between;padding:10px 0;margin-top:4px}
.profit-row .label{font:800 16px 'Plus Jakarta Sans'}.profit-row .value{font:800 24px 'IBM Plex Mono'}
.source{background:#fff;border:1px solid #E8E0D8;border-radius:10px;padding:12px 14px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s ease;min-height:48px}
.source:hover,.source:active{border-color:#FF8A65}
.source a{color:#D84315;text-decoration:none;font:600 14px 'Plus Jakarta Sans'}.source a:hover{color:#FF5722}.source .meta{font:500 12px 'Plus Jakarta Sans';color:#7C6F64}
.risk{font:500 13px/1.5 'Plus Jakarta Sans';color:#E65100;padding:6px 0 6px 10px;border-left:3px solid #FFCC80;margin:4px 0}
.btn{padding:14px 20px;border-radius:10px;font:700 15px 'Plus Jakarta Sans';cursor:pointer;border:2px solid transparent;width:100%;text-align:center;display:block;transition:all .15s ease;min-height:48px}.btn:active{transform:scale(.97);opacity:.9}
.btn-blue{background:linear-gradient(135deg,#D84315,#BF360C);color:#fff;border-color:#D84315;text-decoration:none;box-shadow:0 2px 8px rgba(216,67,21,.25)}.btn-blue:hover{box-shadow:0 4px 12px rgba(216,67,21,.35)}
.btn-green{background:#fff;color:#2E7D32;border-color:#2E7D32}.btn-green.on{background:#2E7D32;color:#fff;box-shadow:0 2px 8px rgba(46,125,50,.25)}
.btn-skip{background:#fff;color:#7C6F64;border-color:#E8E0D8}.btn-skip.on{background:#FFEBEE;color:#C62828;border-color:#C62828}
.btn-outline{background:#fff;border:1.5px solid #E8E0D8;color:#D84315;padding:12px;border-radius:10px}.btn-outline:hover{border-color:#FF8A65;background:#FFF3E0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-box{border-radius:12px;padding:12px 16px;margin:8px 0;font:600 14px/1.5 'Plus Jakarta Sans'}
.info-green{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);color:#2E7D32}.info-yellow{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);color:#E65100}.info-blue{background:linear-gradient(135deg,#FFF3E0,#FBF8F6);color:#BF360C}
.bar{height:6px;background:#E8E0D8;border-radius:3px;overflow:hidden;margin:6px 0}.bar-fill{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px 20px;color:#7C6F64;font:500 15px 'Plus Jakarta Sans'}
.inp{width:100%;padding:14px 16px;background:#FBF8F6;border:1.5px solid #E8E0D8;border-radius:12px;color:#2D2016;font:500 16px 'Plus Jakarta Sans';outline:none;transition:border-color .15s ease;min-height:48px}.inp:focus{border-color:#FF8A65;box-shadow:0 0 0 3px rgba(216,67,21,.08)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:rgba(255,255,255,.25);border-radius:3px;outline:none;margin:12px 0;padding:8px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);border:0;cursor:pointer}
.status-bar{background:#fff;border:1px solid #E8E0D8;border-radius:10px;padding:12px 16px;margin-bottom:12px;font:500 13px 'Plus Jakarta Sans';color:#7C6F64;display:flex;justify-content:space-between}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#FBF8F6;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px 20px calc(24px + env(safe-area-inset-bottom));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.listing-field{background:#fff;border:1px solid #E8E0D8;border-radius:12px;padding:14px;margin:8px 0;position:relative}
.listing-field .lf-label{font:700 11px 'Plus Jakarta Sans';color:#D84315;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.listing-field .lf-content{font:500 14px/1.6 'Plus Jakarta Sans';color:#2D2016;white-space:pre-wrap;word-break:break-word}
.copy-btn{position:absolute;top:10px;right:10px;background:#FFF3E0;border:1px solid #FFCC80;border-radius:8px;padding:4px 10px;font:600 11px 'Plus Jakarta Sans';color:#D84315;cursor:pointer}
.copy-btn:active{background:#FFE0B2}
</style>
</head>
<body>
<div class="hdr">
 <div style="display:flex;justify-content:space-between;align-items:center">
  <div><div style="font:800 22px 'Plus Jakarta Sans';color:#fff">FBA Brain</div><div id="status" style="font:500 12px 'Plus Jakarta Sans';color:rgba(255,255,255,.7);margin-top:2px">Loading...</div></div>
  <div style="text-align:right"><div style="font:500 11px 'Plus Jakarta Sans';color:rgba(255,255,255,.6)">BUDGET</div><div id="budgetN" style="font:800 26px 'IBM Plex Mono';color:#fff">&#163;200</div></div>
 </div>
 <input type="range" id="budgetR" min="100" max="2000" step="50" value="200">
 <div class="tabs"><button class="tab on" data-t="pipeline">Pipeline</button><button class="tab" data-t="edge">Edge</button><button class="tab" data-t="deals">Deals</button><button class="tab" data-t="stock">P&L</button><button class="tab" data-t="setup">Setup</button></div>
</div>
<div class="ct" id="main"></div>
<div id="listingModal"></div>
<script>
let S={deals:[],inventory:[],alerts:[],budget:200},D={},EX=null,TAB='pipeline',SCAN_RESULT=null,LISTING=null;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');TAB=t.dataset.t;render();});
const sl=document.getElementById('budgetR');
sl.oninput=()=>{S.budget=+sl.value;document.getElementById('budgetN').textContent='┬г'+S.budget;render();fetch('/api/budget',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({budget:S.budget})});};
async function load(){try{const r=await fetch('/api/state');S=await r.json();sl.value=S.budget||200;document.getElementById('budgetN').textContent='┬г'+(S.budget||200);const np=(S.deals||[]).filter(d=>d.needsPrice).length;document.getElementById('status').textContent=(np?np+' deals need pricing ┬╖ ':'')+(S.keepa?'Scanner active':'Add Keepa key');render();}catch(e){document.getElementById('main').innerHTML='<div class="empty">Connecting...</div>';}}
function render(){const el=document.getElementById('main');if(TAB==='pipeline')renderPipeline(el);else if(TAB==='edge')renderEdge(el);else if(TAB==='deals')renderDeals(el);else if(TAB==='stock')renderStock(el);else renderSetup(el);document.getElementById('listingModal').innerHTML=LISTING?renderListingModal():'';}
function renderEdge(el){
const E=S.edgeIntel||{};
let h='<div style="font:800 22px \'Plus Jakarta Sans\';margin-bottom:4px">Edge Intelligence</div>';
h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64;margin-bottom:14px">6 strategies other sellers don\'t use. Runs daily at 6am.</div>';
h+='<button class="btn btn-blue" style="margin-bottom:16px" onclick="runEdge()">Run All Scanners Now</button>';

// WEATHER DEMAND
const W=E.weather||{};
h+='<div class="card" style="padding:16px"><div class="section-title">UK WEATHER DEMAND</div>';
if(W.avgMaxTemp){
h+='<div class="metrics"><div class="metric"><div class="metric-label">Avg High</div><div class="metric-value" style="font-size:18px">'+W.avgMaxTemp+'┬░C</div></div><div class="metric"><div class="metric-label">Avg Low</div><div class="metric-value" style="font-size:18px">'+W.avgMinTemp+'┬░C</div></div><div class="metric"><div class="metric-label">Rain Days</div><div class="metric-value" style="font-size:18px">'+W.rainDays+'/7</div></div></div>';
if(W.alerts?.length){W.alerts.forEach(a=>{
h+='<div class="info-box info-yellow" style="margin-top:10px"><div style="font:700 13px \'Plus Jakarta Sans\'">'+a.category+': '+a.reason+'</div><div style="font:500 12px \'Plus Jakarta Sans\';margin-top:4px">'+a.action+'</div></div>';
});}else{h+='<div class="info-box info-green" style="margin-top:10px">No weather triggers active. Normal demand expected.</div>';}
if(W.updated)h+='<div style="font:500 11px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:6px">Updated: '+new Date(W.updated).toLocaleString('en-GB')+'</div>';
}else{h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">Not scanned yet. Tap "Run All Scanners".</div>';}
h+='</div>';

// FX RATE
const F=E.fx||{};
h+='<div class="card" style="padding:16px"><div class="section-title">GBP/CNY EXCHANGE RATE</div>';
if(F.gbpCny){
const fxC=F.signal==='strong_buy'?'#2E7D32':F.signal==='good'?'#2E7D32':F.signal==='wait'?'#C62828':'#7C6F64';
h+='<div class="metrics"><div class="metric"><div class="metric-label">GBP/CNY</div><div class="metric-value" style="font-size:18px;color:'+fxC+'">'+F.gbpCny.toFixed(2)+'</div></div><div class="metric"><div class="metric-label">vs 30d avg</div><div class="metric-value" style="font-size:18px;color:'+fxC+'">'+(F.percentAboveAvg>0?'+':'')+F.percentAboveAvg+'%</div></div><div class="metric"><div class="metric-label">GBP/USD</div><div class="metric-value" style="font-size:18px">'+F.gbpUsd.toFixed(2)+'</div></div></div>';
h+='<div class="info-box '+(F.signal==='strong_buy'||F.signal==='good'?'info-green':F.signal==='wait'?'info-yellow':'info-blue')+'" style="margin-top:10px">'+F.action+'</div>';
if(F.updated)h+='<div style="font:500 11px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:6px">Updated: '+new Date(F.updated).toLocaleString('en-GB')+'</div>';
}else{h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">Not checked yet.</div>';}
h+='</div>';

// VIRAL PRODUCTS
const V=E.viral||[];
h+='<div class="card" style="padding:16px"><div class="section-title">VIRAL PRODUCTS (Reddit/TikTok)</div>';
if(V.length){V.slice(0,8).forEach(v=>{
h+='<div style="padding:10px 0;border-bottom:1px solid #E8E0D8"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font:600 14px \'Plus Jakarta Sans\';color:#2D2016">'+v.title.slice(0,60)+(v.title.length>60?'...':'')+'</div><div style="font:500 11px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:2px">r/'+v.subreddit+' ┬╖ '+v.score+' upvotes ┬╖ '+v.comments+' comments</div>';
if(v.keywords?.length)h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">'+v.keywords.map(k=>'<span class="pill" style="background:#FFF3E0;color:#E65100;font-size:10px">'+k+'</span>').join('')+'</div>';
h+='</div><a href="'+v.url+'" target="_blank" style="font:600 11px \'Plus Jakarta Sans\';color:#D84315;text-decoration:none;white-space:nowrap;margin-left:8px">View тЖТ</a></div>';
if(v.asin)h+='<a href="https://www.amazon.co.uk/dp/'+v.asin+'" target="_blank" style="font:600 11px \'Plus Jakarta Sans\';color:#2E7D32;text-decoration:none;margin-top:4px;display:inline-block">Amazon: '+v.asin+' тЖТ</a>';
h+='</div>';
});}else{h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">Not scanned yet.</div>';}
if(E.viralUpdated)h+='<div style="font:500 11px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:8px">Updated: '+new Date(E.viralUpdated).toLocaleString('en-GB')+'</div>';
h+='</div>';

// MOVERS & SHAKERS
const M=E.movers||[];
h+='<div class="card" style="padding:16px"><div class="section-title">MOVERS & SHAKERS (BSR Surging)</div>';
if(M.length){M.slice(0,6).forEach(m=>{
h+='<div style="padding:10px 0;border-bottom:1px solid #E8E0D8"><div style="font:600 14px \'Plus Jakarta Sans\';color:#2D2016">'+m.name.slice(0,55)+'</div>';
h+='<div style="display:flex;gap:8px;margin-top:4px"><span class="pill" style="background:#E8F5E9;color:#2E7D32">BSR #'+m.bsr+'</span><span class="pill" style="background:#FFF3E0;color:#E65100">'+m.bsrDrops+' drops</span><span class="pill" style="background:#E3F2FD;color:#1565C0">┬г'+m.price.toFixed(2)+'</span></div>';
h+='<div style="font:500 12px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:4px">'+m.reason+'</div></div>';
});}else{h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">Needs Keepa API key to detect movers.</div>';}
h+='</div>';

// STOCK-OUTS
const SO=E.stockOuts||[];
h+='<div class="card" style="padding:16px"><div class="section-title">COMPETITOR STOCK-OUTS</div>';
if(SO.length){SO.slice(0,6).forEach(s=>{
h+='<div style="padding:10px 0;border-bottom:1px solid #E8E0D8"><div style="font:600 14px \'Plus Jakarta Sans\';color:#2D2016">'+s.name.slice(0,55)+'</div>';
h+='<div class="info-box info-green" style="margin-top:6px;font-size:12px">'+s.action+'</div></div>';
});}else{h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">No stock-outs detected. Checked on live items.</div>';}
h+='</div>';

// GOOGLE TRENDS
const T=E.trends||[];
h+='<div class="card" style="padding:16px"><div class="section-title">GOOGLE TRENDS (UK)</div>';
if(T.length){T.slice(0,6).forEach(t=>{
h+='<div style="padding:8px 0;border-bottom:1px solid #E8E0D8"><div style="font:600 14px \'Plus Jakarta Sans\';color:#2D2016">'+t.keyword+'</div>';
h+='<div style="font:500 11px \'Plus Jakarta Sans\';color:#E65100;margin-top:2px">'+t.traffic+' searches ┬╖ Source: '+t.source+'</div></div>';
});}else{h+='<div style="font:500 13px \'Plus Jakarta Sans\';color:#7C6F64">No matching trends detected yet.</div>';}
h+='</div>';

el.innerHTML=h;}
async function runEdge(){document.getElementById('main').innerHTML='<div class="empty">Running 6 edge scanners... (30-60 seconds)</div>';try{await fetch('/api/edge/run',{method:'POST'});await load();}catch(e){await load();}}
function renderPipeline(el){const deals=S.deals||[];const inv=S.inventory||[];
// Count pipeline stages тАФ all deals are now auto-priced, split by profitable/not
const topDeals=deals.filter(d=>d.profitable&&d.status!=='ordered').sort((a,b)=>(b.score||0)-(a.score||0));
const ordered=inv.filter(i=>i.status==='ordered');const atPrep=inv.filter(i=>i.status==='prep');const live=inv.filter(i=>i.status==='live');const totalRev=inv.reduce((a,i)=>a+(i.revenue||0),0);const totalProf=inv.reduce((a,i)=>a+(i.realProfit||0),0);

const ap=S.autopilot||{};const autoApproved=deals.filter(d=>d.autoApproved).length;const autoOrdered=inv.filter(i=>i.autoOrdered).length;

let h='<div style="font:800 22px \'Plus Jakarta Sans\';margin-bottom:4px">FBA Brain</div>';

// AUTOPILOT CARD тАФ the main control
h+='<div class="card" style="padding:16px;border:2px solid '+(ap.enabled?'#2E7D32':'#E8E0D8')+'">';
h+='<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font:700 16px \'Plus Jakarta Sans\';color:'+(ap.enabled?'#2E7D32':'#7C6F64')+'">Autopilot '+(ap.enabled?'ON':'OFF')+'</div>';
h+='<div style="font:500 12px \'Plus Jakarta Sans\';color:#7C6F64;margin-top:2px">'+(ap.enabled?'Finding, ordering & listing automatically':'Tap to enable hands-free mode')+'</div></div>';
h+='<button onclick="toggleAutopilot()" style="width:60px;height:32px;border-radius:16px;border:none;background:'+(ap.enabled?'#2E7D32':'#ccc')+';position:relative;cursor:pointer;transition:background .3s"><div style="width:26px;height:26px;border-radius:13px;background:#fff;position:absolute;top:3px;'+(ap.enabled?'right:3px':'left:3px')+';transition:all .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></button></div>';
if(ap.enabled){
h+='<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">';
h+='<div class="metric"><div class="metric-label">Min Score</div><div class="metric-value" style="font-size:16px">'+ap.minScore+'</div></div>';
h+='<div class="metric"><div class="metric-label">Min Profit</div><div class="metric-value" style="font-size:16px">┬г'+ap.minProfit+'</div></div>';
h+='<div class="metric"><div class="metric-label">Max/Deal</div><div class="metric-value" style="font-size:16px">┬г'+ap.maxSpendPerDeal+'</div></div>';
h+='<div class="metric"><div class="metric-label">Daily Limit</div><div class="metric-value" style="font-size:16px">┬г'+ap.dailyBudgetLimit+'</div></div></div>';
h+='<button class="btn btn-outline" style="margin-top:10px;font-size:12px;padding:8px" onclick="showAutopilotSettings()">Edit settings</button>';
if(autoApproved||autoOrdered)h+='<div style="font:600 12px \'Plus Jakarta Sans\';color:#2E7D32;margin-top:8px">'+autoApproved+' auto-approved ┬╖ '+autoOrdered+' auto-ordered</div>';
}
h+='</div>';

// Edge Intel quick summary on pipeline
const EI=S.edgeIntel||{};const hasEdge=EI.weather||EI.fx||EI.viral?.length||EI.stockOuts?.length;
if(hasEdge){
h+='<div class="card" style="padding:12px;border:1px solid #E3F2FD;background:linear-gradient(135deg,#E3F2FD,#FFF3E0);cursor:pointer" onclick="document.querySelector(\'[data-t=edge]\').click()">';
h+='<div style="font:700 13px \'Plus Jakarta Sans\';color:#1565C0;margin-bottom:6px">Edge Intelligence Active</div>';
const badges=[];
if(EI.weather?.alerts?.length)badges.push('<span class="pill" style="background:#FFF3E0;color:#E65100">'+EI.weather.alerts.length+' weather alerts</span>');

async function setPrice(i){const v=parseFloat(document.getElementById('bp'+i).value);if(!v)return;const deal=S.deals[i];await fetch('/api/deals/'+deal.id+'/price',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyPrice:v})});await load();}
async function recordSale(id){const u=prompt('Units sold:','1');if(!u)return;const p=prompt('Actual sell price (┬г):');if(!p)return;await fetch('/api/inventory/'+id+'/sale',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({units:parseInt(u),actualPrice:parseFloat(p)})});await load();}
async function recordReturn(id){const u=prompt('Units returned:','1');if(!u)return;const r=prompt('Reason (optional):','');await fetch('/api/inventory/'+id+'/return',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({units:parseInt(u),reason:r})});await load();}
load();setInterval(load,30000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');
</script>
